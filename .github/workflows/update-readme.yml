name: "🕒 Update README"

on:
  schedule:
    - cron: '*/15 * * * *'  # Changed to every 15 mins to reduce git noise
  workflow_dispatch:
  push:
    branches:
      - main

# Prevents multiple runs from overlapping if a push takes a while
concurrency:
  group: readme-update
  cancel-in-progress: true

jobs:
  update-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4 # Upgraded to v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
          # No cache needed since we have no dependencies

      - name: Run update script
        run: python3 update_readme.py
        env:
          # The script uses these for the Discord notification and Git push
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
